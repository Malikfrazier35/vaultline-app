          }
        },
        {
          "@type": "Question",
          "name": "How does Vaultline's AI forecasting work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vaultline uses three forecasting models — Linear Regression, Exponential Moving Average (EMA), and Monte Carlo simulation — with confidence bands and burn rate analysis. You can switch between models in one click and view 30, 60, or 90-day projections depending on your plan."
          }
        },
        {
          "@type": "Question",

          }
        }
      ]
    }
